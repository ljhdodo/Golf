.tab{flex:0 0 auto;padding:9px 13px;background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.tab.on{color:#4ade80;border-bottom-color:#4ade80;font-weight:700}
#bdy{padding:14px}
.page{display:none}.page.show{display:block}

.row{display:flex;align-items:center;gap:10px;padding:12px 14px}
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.hnum{font-size:24px;font-weight:900;color:#4ade80;line-height:1}
.gbtn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#065f46,#059669);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.sbtn{padding:10px 14px;background:#0f1923;border:1px solid #1e2d3d;border-radius:10px;color:#94a3b8;font-size:13px;font-weight:600;cursor:pointer}
.ifield{background:#1a2535;border:1px solid #2a3a50;border-radius:10px;color:#fff;font-size:15px;padding:10px 13px;outline:none;width:100%}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.tw{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;border:1.5px solid #1a2535;background:#080C14;cursor:pointer;margin-bottom:6px}
.tw.on{border-color:#4ade8055;background:#041a10}
.tt{width:34px;height:19px;border-radius:10px;background:#1e2d3d;position:relative;flex-shrink:0;transition:background .2s}
.tt.on{background:#059669}
.tk{position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .15s}
.tt.on .tk{left:18px}
.dtrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #0f1923;font-size:12px}
.dtrow:last-child{border-bottom:none;padding-top:8px;border-top:1px solid #1e2d3d;margin-top:4px}
.loading{text-align:center;padding:40px;color:#475569;font-size:13px}

/* ── 핸디캡 계산 ── */
function hcp(m){
  if(!m.sc||!m.sc.length) return m.ph!=null?Math.min(100,m.ph):null;
  var r=m.sc.slice(-5);
  var b2=r.slice().sort(function(a,b){return a-b;}).slice(0,Math.min(2,r.length));
  var b3=r.slice().sort(function(a,b){return a-b;}).slice(0,Math.min(3,r.length));
  var avg2=b2.reduce(function(a,c){return a+c;},0)/b2.length;
  var avg3=b3.reduce(function(a,c){return a+c;},0)/b3.length;
  var p=m.ph!=null?Math.min(100,Math.floor(m.ph)):null;
  if(p!=null&&avg2<p) return p;
  return Math.min(100,Math.floor(avg3));
}
function det(m){
  if(!m.sc||!m.sc.length) return null;
  var r=m.sc.slice(-5);
  var b2=r.slice().sort(function(a,b){return a-b;}).slice(0,Math.min(2,r.length));
  var b3=r.slice().sort(function(a,b){return a-b;}).slice(0,Math.min(3,r.length));
  var avg2=b2.reduce(function(a,c){return a+c;},0)/b2.length;
  var avg3=b3.reduce(function(a,c){return a+c;},0)/b3.length;
  var p=m.ph!=null?Math.min(100,Math.floor(m.ph)):null;
  var usePrev=p!=null&&avg2<p;
  var fin=usePrev?p:Math.min(100,Math.floor(avg3));
  return{r5:r,b2:b2,b3:b3,avg2:avg2,avg3:avg3,p:p,fin:fin,usePrev:usePrev};
}
function tier(h){
  if(h==null) return{l:"미입력",bg:"#1e293b",tx:"#64748b"};
  if(h<=72)   return{l:"파이하",bg:"#041a10",tx:"#4ade80"};
  if(h<=80)   return{l:"싱글급",bg:"#061530",tx:"#60a5fa"};
  if(h<=90)   return{l:"중수",  bg:"#1e1200",tx:"#fbbf24"};
               return{l:"보기",  bg:"#1e0808",tx:"#f87171"};
}
function fmtDate(dt){
  if(!dt) return '';
  var p=dt.split('-');
  return p.length>=3?p[0].slice(2)+'.'+p[1]:dt;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 탭 ── */
function go(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('on',['r','s','g','n','m'][i]===t);
  });
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('show');});
  document.getElementById('p'+t).classList.add('show');
  if(t==='r') drawR();
  else if(t==='s') drawS();
  else if(t==='g') drawG();
  else if(t==='n') drawN();
  else drawM();
}

        '</div>'+
        '<div style="width:100%;height:'+ht[pi]+'px;background:'+c+'18;border:1px solid '+c+'33;border-radius:9px 9px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px">'+
          '<span style="font-size:28px;font-weight:900;color:'+c+'44">'+pos+'</span>'+
        '</div>'+
      '</div>';
    });
    h+='</div>';
  }

  sd.slice(3).forEach(function(m,i){
    var v=hcp(m), t=tier(v), d=det(m);
    var sub=d&&d.usePrev?'<span style="color:#60a5fa">직전핸디 유지</span>':'베스트3 '+(d?d.avg3.toFixed(1):'');
    h+='<div class="card"><div class="row">'+
      '<div style="width:28px;height:28px;border-radius:8px;background:#1e2d3d;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#64748b;flex-shrink:0">'+(i+4)+'</div>'+
      '<div style="flex:1"><div style="font-weight:700;font-size:15px">'+esc(m.name)+'</div>'+
      '<div style="font-size:11px;color:#475569;margin-top:2px">'+sub+' · '+m.sc.length+'R</div></div>'+
      '<div style="text-align:right"><div class="hnum">'+(v!=null?v:'-')+'</div>'+
      '<div class="badge" style="background:'+t.bg+';color:'+t.tx+';margin-top:3px">'+t.l+'</div></div>'+
    '</div></div>';
  });
  h+='<button class="gbtn" onclick="go(\'g\');setTimeout(doGroups,100)">⚡ 조편성 실행하기</button>';
  el.innerHTML=h;
}

/* ══ 타수 입력 ══ */
function drawS(){
  var el=document.getElementById('ps');
  if(!D.length){el.innerHTML='<div class="loading">데이터 로딩 중...</div>';return;}
  var h='';
  D.forEach(function(m){
    var d=det(m), t=tier(d?d.fin:null);
    var r5=m.sc.slice(-5);
    var b2v=r5.slice().sort(function(a,b){return a-b;}).slice(0,Math.min(2,r5.length));
    var b2i=(function(){var tmp=b2v.slice(),res=[];r5.forEach(function(v,i){var ti=tmp.indexOf(v);if(ti>=0){res.push(i);tmp.splice(ti,1);}});return res;})();
    h+='<div class="card" style="margin-bottom:10px">'+
      '<div class="row" style="border-bottom:1px solid #1e2d3d">'+
        '<div class="av" style="background:'+t.bg+';border:1.5px solid '+t.tx+'55;color:'+t.tx+'">'+esc(m.name[0])+'</div>'+
        '<div style="flex:1"><div style="font-weight:700;font-size:15px">'+esc(m.name)+'</div>'+
        '<div style="font-size:11px;color:#475569;margin-top:2px">'+m.sc.length+'R · 직전핸디 '+(m.ph!=null?m.ph:'-')+'</div></div>'+
        (d?'<div style="text-align:right"><div class="hnum">'+d.fin+'</div>'+
        '<button onclick="toggleDet('+m.id+')" style="background:none;border:none;color:#4ade80;font-size:11px;cursor:pointer;padding:2px 0">'+(DOPEN[m.id]?'닫기▲':'상세▼')+'</button></div>':'')+
      '</div>';
    if(DOPEN[m.id]&&d){
      h+='<div style="padding:12px 14px;background:#060d16;border-bottom:1px solid #1e2d3d">'+
        '<div class="dtrow"><span style="color:#64748b">최근 5라운드</span><span style="color:#94a3b8">'+d.r5.join(' / ')+'타</span></div>'+
        '<div class="dtrow"><span style="color:#64748b">베스트 2</span><span style="color:#60a5fa;font-weight:700">'+d.b2.join(', ')+'타 · 평균 '+d.avg2.toFixed(1)+'</span></div>'+
        '<div class="dtrow"><span style="color:#64748b">베스트 3</span><span style="color:#4ade80;font-weight:700">'+d.b3.join(', ')+'타 · 평균 '+d.avg3.toFixed(1)+'</span></div>'+
        (d.p!=null?'<div class="dtrow"><span style="color:#64748b">직전 핸디</span><span style="color:#f59e0b;font-weight:700">'+d.p+'타</span></div>':'')+
        '<div class="dtrow"><span style="color:#64748b">판정</span><span style="font-size:11px;color:'+(d.usePrev?'#f59e0b':'#4ade80')+'">'+(d.usePrev?'베스트2('+d.avg2.toFixed(1)+') &lt; 직전 → 직전유지':'베스트2('+d.avg2.toFixed(1)+') ≥ 직전 → 베스트3 적용')+'</span></div>'+
        '<div class="dtrow"><span style="color:#fff;font-weight:700;font-size:13px">최종 핸디</span><span style="font-size:20px;font-weight:900;color:#4ade80">'+d.fin+'타</span></div>'+
      '</div>';
    }
    if(m.sc.length){
      h+='<div style="padding:10px 14px;border-bottom:1px solid #1e2d3d;overflow-x:auto"><div style="display:flex;gap:6px;min-width:max-content">';
      m.sc.forEach(function(v,i){
        var isR=i>=m.sc.length-5, idx5=i-(m.sc.length-5);
        var isB=isR&&b2i.indexOf(idx5)>=0;
        h+='<div style="text-align:center;flex-shrink:0">'+
          '<div style="font-size:9px;color:#475569;margin-bottom:1px">'+fmtDate(m.dt[i])+'</div>'+
          '<div style="font-size:8px;color:#334155;margin-bottom:3px;width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center">'+esc(m.co[i]||'')+'</div>'+
          '<div style="width:46px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:'+(isB?900:500)+';'+
          'background:'+(isB?'#041a10':isR?'#101e2e':'transparent')+';border:1.5px solid '+(isB?'#4ade80':isR?'#1e2d3d':'transparent')+';color:'+(isB?'#4ade80':isR?'#94a3b8':'#2d3f52')+'">'+v+'</div>'+
          '<div style="font-size:9px;color:'+(isB?'#4ade80':'transparent')+';margin-top:2px">★</div>'+
        '</div>';
      });
      h+='</div></div>';
    }
    h+='<div style="padding:10px 14px;display:flex;gap:7px">'+
      '<input class="ifield" id="si'+m.id+'" type="number" min="50" max="150" placeholder="타수 입력" style="flex:1" onkeydown="if(event.key===\'Enter\')addSc('+m.id+')"/>'+
      '<button onclick="addSc('+m.id+')" style="background:#065f46;border:none;border-radius:10px;color:#4ade80;font-weight:700;font-size:14px;cursor:pointer;padding:10px 16px">기록</button>'+
      (m.sc.length?'<button onclick="delSc('+m.id+')" style="background:#1a2535;border:1px solid #f8714122;border-radius:10px;color:#f87171;font-size:12px;cursor:pointer;padding:10px 11px">삭제</button>':'')+
    '</div></div>';
  });
  el.innerHTML=h;
}
function toggleDet(id){DOPEN[id]=!DOPEN[id];drawS();}
function addSc(id){
  var v=parseInt(document.getElementById('si'+id).value);
  if(isNaN(v)||v<50||v>150) return;
  var m=D.find(function(x){return x.id===id;});
  if(!m) return;
  if(!m.sc) m.sc=[];
  if(!m.dt) m.dt=[];
  if(!m.co) m.co=[];
  m.sc.push(v); m.dt.push(new Date().toISOString().slice(0,10)); m.co.push('');
  saveMember(m);
}
function delSc(id){
  var m=D.find(function(x){return x.id===id;});
  if(!m||!m.sc||!m.sc.length) return;
  m.sc.pop(); m.dt.pop(); m.co.pop();
  saveMember(m);
}

/* ══ 조편성 ══ */
function drawG(){
  var el=document.getElementById('pg');
  if(!D.length){el.innerHTML='<div class="loading">데이터 로딩 중...</div>';return;}
  var cnt=D.filter(function(m){return AT[m.id];}).length;
  var h='<div class="card" style="padding:14px;margin-bottom:10px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<div style="font-size:13px;font-weight:700">참가자 선택</div>'+
    '<div style="font-size:11px;color:#4ade80;font-weight:700">'+cnt+'명 참가</div></div>';
  D.forEach(function(m){
    var on=!!AT[m.id], v=hcp(m), t=tier(v);
    h+='<div class="tw'+(on?' on':'')+'" onclick="togAT('+m.id+')">'+
      '<div class="tt'+(on?' on':'')+'"><div class="tk"></div></div>'+
      '<div class="av" style="background:'+t.bg+';border:1px solid '+t.tx+'33;color:'+(on?t.tx:'#2d3f52')+'">'+esc(m.name[0])+'</div>'+
      '<div style="flex:1"><div style="font-weight:700;font-size:14px;color:'+(on?'#fff':'#475569')+'">'+esc(m.name)+'</div>'+
      '<div style="font-size:11px;color:'+(on?'#64748b':'#334155')+'">핸디 '+(v!=null?v:'-')+'</div></div>'+
      '<div style="font-size:11px;font-weight:700;color:'+(on?'#4ade80':'#334155')+'">'+(on?'참가✓':'불참')+'</div></div>';
  });
  h+='</div><div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<button onclick="doGroups()" style="flex:1;padding:14px;background:linear-gradient(135deg,#065f46,#059669);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">⚡ '+cnt+'명으로 조편성</button>'+
    (GRP.length?'<button class="sbtn" onclick="doGroups()">🔀 재배정</button>':'')+
  '</div>';
  if(GRP.length){
    var avgs=GRP.map(function(g){var hs=g.map(function(m){return hcp(m);}).filter(function(v){return v!=null;});return hs.length?hs.reduce(function(a,b){return a+b;},0)/hs.length:0;});
    var mx=Math.max.apply(null,avgs)||1;
    GRP.forEach(function(g,gi){
      var gc=GC[gi%4], avg=Math.round(avgs[gi]*10)/10;
      h+='<div style="background:#0f1923;border:1px solid '+gc+'33;border-radius:14px;overflow:hidden;margin-bottom:10px">'+
        '<div style="padding:11px 14px;background:'+gc+'14;border-bottom:1px solid '+gc+'22;display:flex;justify-content:space-between;align-items:center">'+
        '<div style="display:flex;align-items:center;gap:9px">'+
        '<div style="width:32px;height:32px;border-radius:9px;background:'+gc+'22;border:1.5px solid '+gc+'55;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:'+gc+'">'+(gi+1)+'</div>'+
        '<span style="font-size:15px;font-weight:700;color:'+gc+'">'+(gi+1)+'조</span></div>'+
        '<div style="font-size:12px;color:#64748b">평균 <span style="color:'+gc+';font-weight:700">'+avg+'</span>타</div></div><div style="padding:6px">';
      g.forEach(function(m){
        var v=hcp(m), t=tier(v), d=det(m);
        h+='<div style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;margin-bottom:3px">'+
          '<div class="av" style="background:'+t.bg+';border:1px solid '+t.tx+'33;color:'+t.tx+'">'+esc(m.name[0])+'</div>'+
          '<div style="flex:1"><div style="font-weight:700;font-size:14px">'+esc(m.name)+'</div>'+
          '<div style="font-size:11px;color:#475569">'+(d&&d.usePrev?'<span style="color:#60a5fa">직전유지</span>':'베스트3')+'</div></div>'+
          '<div style="font-size:26px;font-weight:900;color:#e2e8f0;line-height:1">'+(v!=null?v:'-')+'</div></div>';
      });
      h+='</div></div>';
    });
    h+='<div class="card" style="padding:14px"><div style="font-size:11px;color:#475569;font-weight:700;margin-bottom:10px">조별 핸디캡 균형</div>';
    GRP.forEach(function(g,gi){
      var gc=GC[gi%4], avg=Math.round(avgs[gi]*10)/10;
      h+='<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'+
        '<span style="color:#94a3b8">'+(gi+1)+'조 · '+g.map(function(m){return esc(m.name);}).join(', ')+'</span>'+
        '<span style="color:'+gc+';font-weight:700">'+avg+'타</span></div>'+
        '<div style="height:6px;background:#1e2d3d;border-radius:3px;overflow:hidden">'+
        '<div style="height:100%;width:'+Math.max(5,avgs[gi]/mx*100)+'%;background:'+gc+';border-radius:3px"></div></div></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}
function togAT(id){AT[id]=!AT[id]; GRP=[]; drawG();}
function doGroups(){
  var act=D.filter(function(m){return AT[m.id]&&m.sc&&m.sc.length>0;});
  if(!act.length){alert('타수가 입력된 참가자가 없습니다');return;}
  var sd=act.slice().sort(function(a,b){return hcp(a)-hcp(b);});
  var n=sd.length, gc=n<=3?1:Math.ceil(n/4), gs=[];
  for(var i=0;i<gc;i++) gs.push([]);
  sd.forEach(function(m,idx){var row=Math.floor(idx/gc),col=row%2===0?idx%gc:gc-1-(idx%gc);gs[col].push(m);});
  GRP=gs.filter(function(g){return g.length>0;});
  drawG();
}

/* ══ 공지 & 사진 ══ */
function drawN(){
  var el=document.getElementById('pn');
  var h='<div class="card" style="padding:14px;margin-bottom:10px">'+
    '<div style="font-size:13px;font-weight:700;margin-bottom:10px">📢 공지사항 등록</div>'+
    '<input class="ifield" id="nt" placeholder="제목" style="margin-bottom:8px"/>'+
    '<textarea id="nb" placeholder="내용을 입력하세요" style="width:100%;background:#1a2535;border:1px solid #2a3a50;border-radius:10px;color:#fff;font-size:14px;padding:10px 13px;outline:none;min-height:80px;resize:none;margin-bottom:8px;font-family:inherit"></textarea>'+
    '<button onclick="addNotice()" style="width:100%;padding:12px;background:#065f46;border:none;border-radius:10px;color:#4ade80;font-weight:700;font-size:14px;cursor:pointer">등록</button></div>';
  h+='<div class="card" style="padding:14px;margin-bottom:14px">'+
    '<div style="font-size:13px;font-weight:700;margin-bottom:10px">📷 라운드 사진 등록</div>'+
    '<input type="text" class="ifield" id="pc" placeholder="사진 설명 (예: 25.08 베르힐영종)" style="margin-bottom:8px"/>'+
    '<input type="file" id="pf" accept="image/*" style="display:none" onchange="addPhoto()"/>'+
    '<button onclick="document.getElementById(\'pf\').click()" style="width:100%;padding:12px;background:#1a2535;border:2px dashed #2a3a50;border-radius:10px;color:#94a3b8;font-weight:700;font-size:14px;cursor:pointer">📁 갤러리에서 사진 선택</button></div>';
  if(NOTICES.length){
    h+='<div style="font-size:11px;color:#475569;font-weight:700;margin-bottom:8px">— 공지사항 —</div>';
    NOTICES.forEach(function(n){
      h+='<div class="card" style="padding:14px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
        '<div style="font-weight:700;font-size:14px;color:#fff;flex:1">'+esc(n.title)+'</div>'+
        '<button onclick="delNoticeDB(\''+n.id+'\')" style="background:none;border:none;color:#f87171;font-size:18px;cursor:pointer;padding:0 0 0 8px">✕</button></div>'+
        '<div style="font-size:13px;color:#94a3b8;white-space:pre-wrap;line-height:1.6">'+esc(n.body)+'</div>'+
        '<div style="font-size:10px;color:#334155;margin-top:8px">'+esc(n.date)+'</div></div>';
    });
  }
  if(PHOTOS.length){
    h+='<div style="font-size:11px;color:#475569;font-weight:700;margin:12px 0 8px">— 라운드 사진 —</div>';
    PHOTOS.forEach(function(p){
      h+='<div class="card" style="overflow:hidden;margin-bottom:10px">'+
        '<img src="'+p.src+'" style="width:100%;display:block;max-height:280px;object-fit:cover"/>'+
        '<div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-size:13px;font-weight:600;color:#e2e8f0">'+esc(p.caption||'')+'</div>'+
        '<div style="font-size:10px;color:#334155;margin-top:2px">'+esc(p.date)+'</div></div>'+
        '<button onclick="delPhotoDB(\''+p.id+'\')" style="background:none;border:none;color:#f87171;font-size:18px;cursor:pointer">✕</button></div></div>';
    });
  }
  if(!NOTICES.length&&!PHOTOS.length){
    h+='<div style="text-align:center;padding:50px 20px;color:#334155">'+
      '<div style="font-size:44px;margin-bottom:14px">📋</div>'+
      '<div style="font-size:14px">공지사항이나 사진을 등록해보세요</div></div>';
  }
  el.innerHTML=h;
}
function addNotice(){
  var t=document.getElementById('nt').value.trim();
  var b=document.getElementById('nb').value.trim();
  if(!t) return;
  var id='n'+Date.now();
  saveNotice({id:id,title:t,body:b,date:new Date().toLocaleDateString('ko-KR'),ts:Date.now()});
}
function addPhoto(){
  var file=document.getElementById('pf').files[0];
  var cap=document.getElementById('pc').value.trim();
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var id='p'+Date.now();
    savePhoto({id:id,src:ev.target.result,caption:cap,date:new Date().toLocaleDateString('ko-KR'),ts:Date.now()});
  };
  reader.readAsDataURL(file);
}

/* ══ 멤버 ══ */
function drawM(){
  var el=document.getElementById('pm');
  var h='<div class="card" style="padding:12px;display:flex;gap:8px;margin-bottom:8px">'+
    '<input class="ifield" id="ni" placeholder="새 멤버 이름" onkeydown="if(event.key===\'Enter\')addM()" style="flex:1"/>'+
    '<button onclick="addM()" style="background:#065f46;border:none;border-radius:10px;color:#4ade80;font-weight:700;font-size:14px;cursor:pointer;padding:10px 16px;white-space:nowrap">추가</button></div>';
  D.forEach(function(m){
    var v=hcp(m), t=tier(v);
    h+='<div class="card"><div class="row">'+
      '<div class="av" style="width:40px;height:40px;border-radius:12px;background:'+t.bg+';border:1.5px solid '+t.tx+'44;color:'+t.tx+'">'+esc(m.name[0])+'</div>'+
      '<div style="flex:1"><div style="font-weight:700;font-size:14px">'+esc(m.name)+'</div>'+
      '<div style="font-size:11px;color:#475569;margin-top:2px">'+t.l+' · '+(m.sc?m.sc.length:0)+'R · 직전핸디 '+(m.ph!=null?m.ph:'-')+'</div></div>'+
      '<div class="hnum" style="margin-right:8px">'+(v!=null?v:'-')+'</div>'+
      '<button onclick="delM('+m.id+')" style="background:#1a0808;border:1px solid #f8714122;border-radius:8px;color:#f87171;font-size:13px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0">✕</button>'+
    '</div></div>';
  });
  el.innerHTML=h;
}
function addM(){
  var v=document.getElementById('ni').value.trim();
  if(!v||D.find(function(m){return m.name===v;})) return;
  var id=Date.now();
  var newM={id:id,name:v,ph:null,sc:[],dt:[],co:[]};
  AT[id]=true;
  saveMember(newM);
}
function delM(id){
  db.ref('members/'+id).remove();
  delete AT[id];
}
